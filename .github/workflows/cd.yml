name: CD

on:
  push:
    branches:
      - main

# Needed so the workflow can push the freshly built dist/ back to the repo
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip the run triggered by our own "[skip ci]" build commit
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Commit built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist
          if git diff --staged --quiet; then
            echo "No change in dist/, nothing to publish."
          else
            git commit -m "build: update dist [skip ci]"
            git push
          fi

      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/dist/main.js" || true
